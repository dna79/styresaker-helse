<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SP Prosessarkitektur → IT4IT v3 mapping</title>
<style>
  :root {
    --navy: #0f1f3d;
    --blue: #003087;
    --accent: #6cace4;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

  /* ── Header ── */
  header {
    background: var(--navy);
    color: white;
    padding: 20px 32px 16px;
    display: flex;
    align-items: flex-end;
    gap: 24px;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header p  { font-size: 11px; color: var(--accent); margin-top: 3px; }

  /* ── Filter bar ── */
  .filters {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .filters label { font-size: 11px; font-weight: 600; color: var(--muted); }
  .filters select, .filters input[type=text] {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    outline: none;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
  }
  .filters select:focus, .filters input[type=text]:focus { border-color: var(--accent); }
  #resultCount { margin-left: auto; font-size: 11px; color: var(--muted); }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; padding: 20px 32px 40px; }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  thead tr { background: var(--navy); color: white; }
  th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; white-space: nowrap; }
  td { padding: 10px 14px; vertical-align: top; border-bottom: 1px solid var(--border); line-height: 1.45; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f1f5f9; }

  /* col widths */
  td:nth-child(1) { min-width: 230px; max-width: 280px; }
  td:nth-child(2) { min-width: 200px; }
  td:nth-child(3) { min-width: 180px; }
  td:nth-child(4) { min-width: 220px; color: var(--muted); font-size: 12px; }
  td:nth-child(5) { min-width: 220px; font-size: 12px; }

  /* ── Badges ── */
  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .03em;
    white-space: nowrap;
  }
  /* Prosess-type */
  .b-kjerne  { background: #dbeafe; color: #1d4ed8; }
  .b-styring { background: #ede9fe; color: #6d28d9; }
  .b-stotte  { background: #dcfce7; color: #15803d; }

  /* Verdistrøm */
  .v-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    margin: 2px 2px 2px 0;
    white-space: nowrap;
  }
  .v-evaluere      { background: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd; }
  .v-utforske      { background: #fdf4ff; color: #7e22ce; border: 1px solid #e9d5ff; }
  .v-utvikle       { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
  .v-produksjonssette { background: #fefce8; color: #a16207; border: 1px solid #fef08a; }
  .v-tilgjengelig  { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
  .v-bruke         { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
  .v-drifte        { background: #f8fafc; color: #334155; border: 1px solid #cbd5e1; }
  .v-tverrgående   { background: #fafaf9; color: #57534e; border: 1px solid #d6d3d1; }

  /* Funksjonell gruppe */
  .fg { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; margin: 2px 2px 2px 0; white-space: nowrap; }
  .fg-strategy  { background: #0f1f3d; color: #fff; }
  .fg-portfolio { background: #1e40af; color: #fff; }
  .fg-develop   { background: #0891b2; color: #fff; }
  .fg-test      { background: #6d28d9; color: #fff; }
  .fg-fulfill   { background: #b45309; color: #fff; }
  .fg-consume   { background: #be123c; color: #fff; }
  .fg-support   { background: #15803d; color: #fff; }
  .fg-assure    { background: #374151; color: #fff; }
  .fg-none      { background: #e5e7eb; color: #6b7280; }

  /* Dekning */
  .cov-ok   { color: #15803d; font-weight: 700; }
  .cov-part { color: #b45309; font-weight: 700; }
  .cov-gap  { color: #b91c1c; font-weight: 700; }

  .proc-name { font-weight: 600; font-size: 13px; }
  .sub-list  { color: var(--muted); font-size: 11px; margin-top: 3px; line-height: 1.6; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Sykehuspartner prosessarkitektur → IT4IT v3</h1>
    <p>Mapping av SP-prosesser til IT4IT verdistrømmer og funksjonelle grupper</p>
  </div>
</header>

<div class="filters">
  <label>Prosesstype</label>
  <select id="fType">
    <option value="">Alle</option>
    <option value="Kjerne">Kjerne</option>
    <option value="Styring">Styring</option>
    <option value="Støtte">Støtte</option>
  </select>

  <label>Verdistrøm</label>
  <select id="fVS">
    <option value="">Alle</option>
    <option value="Evaluere produkter">Evaluere produkter</option>
    <option value="Utforske produkter">Utforske produkter</option>
    <option value="Utvikle nye produkter">Utvikle nye produkter</option>
    <option value="Produksjonssette produkter">Produksjonssette produkter</option>
    <option value="Tilgjengeliggjøre produkter">Tilgjengeliggjøre produkter</option>
    <option value="Bruke produkter">Bruke produkter</option>
    <option value="Drifte produkter">Drifte produkter</option>
    <option value="Tverrgående">Tverrgående</option>
  </select>

  <label>Funksjonell gruppe</label>
  <select id="fFG">
    <option value="">Alle</option>
    <option value="Strategy">Strategy</option>
    <option value="Portfolio">Portfolio</option>
    <option value="Develop">Develop</option>
    <option value="Test">Test</option>
    <option value="Fulfill">Fulfill</option>
    <option value="Consume">Consume</option>
    <option value="Support">Support</option>
    <option value="Assure">Assure</option>
  </select>

  <label>Søk</label>
  <input type="text" id="fSearch" placeholder="Prosessnavn…" style="width:180px" />

  <span id="resultCount"></span>
</div>

<div class="table-wrap">
<table id="mainTable">
  <thead>
    <tr>
      <th>SP-prosess</th>
      <th>Verdistrøm</th>
      <th>Funksjonell gruppe</th>
      <th>Utvalgte undernivåer</th>
      <th>Merknad / kobling til kapabilitetsmodell</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>

<script>

const VS_CLASS = {
  "Evaluere produkter":        "v-evaluere",
  "Utforske produkter":        "v-utforske",
  "Utvikle nye produkter":     "v-utvikle",
  "Produksjonssette produkter":"v-produksjonssette",
  "Tilgjengeliggjøre produkter":"v-tilgjengelig",
  "Bruke produkter":           "v-bruke",
  "Drifte produkter":          "v-drifte",
  "Tverrgående":               "v-tverrgående",
};

const FG_CLASS = {
  Strategy: "fg-strategy", Portfolio: "fg-portfolio",
  Develop:  "fg-develop",  Test:      "fg-test",
  Fulfill:  "fg-fulfill",  Consume:   "fg-consume",
  Support:  "fg-support",  Assure:    "fg-assure",
  "—":      "fg-none",
};

const TYPE_CLASS = { Kjerne: "b-kjerne", Styring: "b-styring", Støtte: "b-stotte" };

function vPill(v)  { return `<span class="v-pill ${VS_CLASS[v]||'v-tverrgående'}">${v}</span>`; }
function fg(g)     { return `<span class="fg ${FG_CLASS[g]||'fg-none'}">${g}</span>`; }
function cov(s, txt) {
  const cls = s==="✓" ? "cov-ok" : s==="~" ? "cov-part" : "cov-gap";
  return `<span class="${cls}">${s}</span> ${txt}`;
}

// ── Render ──────────────────────────────────────────────────────────────────

function renderRows(data) {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  data.forEach(r => {
    const tr = document.createElement("tr");
    tr.dataset.type = r.type;
    tr.dataset.vs   = r.vs.join("|");
    tr.dataset.fg   = r.fg.join("|");
    tr.dataset.name = r.name.toLowerCase();

    tr.innerHTML = `
      <td>
        <span class="badge ${TYPE_CLASS[r.type]}">${r.type}</span>
        <div class="proc-name" style="margin-top:5px">${r.name}</div>
      </td>
      <td>${r.vs.map(vPill).join("")}</td>
      <td>${r.fg.map(fg).join("")}</td>
      <td class="sub-list">${r.subs.length ? r.subs.join("<br>") : "—"}</td>
      <td>${r.note}</td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById("resultCount").textContent =
    `${data.length} av ${rows.length} prosesser`;
}

function applyFilters() {
  const type   = document.getElementById("fType").value;
  const vs     = document.getElementById("fVS").value;
  const fgVal  = document.getElementById("fFG").value;
  const search = document.getElementById("fSearch").value.toLowerCase();

  const filtered = rows.filter(r => {
    if (type   && r.type !== type)                   return false;
    if (vs     && !r.vs.includes(vs))                return false;
    if (fgVal  && !r.fg.includes(fgVal))             return false;
    if (search && !r.name.toLowerCase().includes(search)) return false;
    return true;
  });
  renderRows(filtered);
}

["fType","fVS","fFG"].forEach(id =>
  document.getElementById(id).addEventListener("change", applyFilters));
document.getElementById("fSearch").addEventListener("input", applyFilters);

renderRows(rows);
</script>
